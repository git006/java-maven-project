name: Java Maven CI

# 触发条件：当你把代码 push 到 main 或 master 分支时触发
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: 拉取源码
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: 初始化 JDK 17 并配置 Maven 缓存
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # 极其重要：跳过重复下载依赖，加速构建

    # Step 3: 执行你刚刚在本地跑通的命令
    - name: Run Maven Tests
      run: mvn -B clean test